services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: resale_erp
      POSTGRES_USER: resale
      POSTGRES_PASSWORD: resale
    ports:
      - "5432:5432"
    volumes:
      - resale_erp_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resale -d resale_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  resale_erp_postgres:
